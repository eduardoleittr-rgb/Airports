SELECT
 airport.id,
 airport.name,
 airport.city,
 airport.iatacode,
 airport.latitude,
 airport.longitude,
 airport.altitude,
 SQRT(
 power(airport.latitude - -23.164400, 2 ) +
 power(airport.longitude - -45.896675, 2)) * 60 * 1.852 as
distanciaKM
from AIRPORT
order by distanciaKM
limit 10;
